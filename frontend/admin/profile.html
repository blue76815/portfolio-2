<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人資料 | 後台管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white">

    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 w-64 h-full bg-slate-800 border-r border-white/10 z-40">
        <div class="p-6">
            <h1 class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-violet-400 bg-clip-text text-transparent">後台管理</h1>
        </div>
        <nav class="mt-4">
            <a href="dashboard.html" class="flex items-center px-6 py-3 text-slate-300 hover:text-white hover:bg-white/5 border-l-4 border-transparent transition">
                <span class="mr-3">📊</span> 儀表板
            </a>
            <a href="projects.html" class="flex items-center px-6 py-3 text-slate-300 hover:text-white hover:bg-white/5 border-l-4 border-transparent transition">
                <span class="mr-3">💼</span> 作品管理
            </a>
            <a href="messages.html" class="flex items-center px-6 py-3 text-slate-300 hover:text-white hover:bg-white/5 border-l-4 border-transparent transition">
                <span class="mr-3">💬</span> 留言管理
            </a>
            <a href="profile.html" class="flex items-center px-6 py-3 text-cyan-400 border-l-4 border-cyan-400 bg-white/5">
                <span class="mr-3">👤</span> 個人資料
            </a>
            <button onclick="logout()" class="flex items-center px-6 py-3 text-slate-300 hover:text-red-400 hover:bg-white/5 border-l-4 border-transparent transition w-full text-left mt-8">
                <span class="mr-3">🚪</span> 登出
            </button>
        </nav>
    </aside>

    <!-- 主內容 -->
    <main class="ml-64 p-8">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-white">個人資料</h2>
            <p class="text-slate-400 mt-2">編輯你的個人資料，會顯示在前台「關於我」頁面</p>
        </div>

        <div class="bg-slate-800 border border-white/10 rounded-xl p-8 max-w-2xl">
            <form id="profileForm" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-slate-300 text-sm mb-1">名字</label>
                        <input type="text" id="profileName" class="w-full px-4 py-2 bg-slate-700 border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-400 transition">
                    </div>
                    <div>
                        <label class="block text-slate-300 text-sm mb-1">職稱</label>
                        <input type="text" id="profileTitle" class="w-full px-4 py-2 bg-slate-700 border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-400 transition">
                    </div>
                </div>
                <div>
                    <label class="block text-slate-300 text-sm mb-1">自我介紹</label>
                    <textarea id="profileBio" rows="4" class="w-full px-4 py-2 bg-slate-700 border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-400 transition resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-slate-300 text-sm mb-1">頭像網址</label>
                    <input type="text" id="profileAvatar" class="w-full px-4 py-2 bg-slate-700 border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-400 transition">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                    <div>
                        <label class="block text-slate-300 text-sm mb-1">Email</label>
                        <input type="email" id="profileEmail" class="w-full px-4 py-2 bg-slate-700 border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-400 transition">
                    </div>
                    <div>
                        <label class="block text-slate-300 text-sm mb-1">GitHub</label>
                        <input type="text" id="profileGithub" class="w-full px-4 py-2 bg-slate-700 border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-400 transition">
                    </div>
                    <div>
                        <label class="block text-slate-300 text-sm mb-1">LinkedIn</label>
                        <input type="text" id="profileLinkedin" class="w-full px-4 py-2 bg-slate-700 border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-400 transition">
                    </div>
                </div>
                <button type="submit" class="w-full py-3 bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-semibold rounded-lg transition mt-4">
                    儲存資料
                </button>
            </form>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        checkAuth();

        async function loadProfile() {
            try {
                const res = await authFetch('/api/profile');
                if (res && res.success && res.data) {
                    const p = res.data;
                    document.getElementById('profileName').value = p.name || '';
                    document.getElementById('profileTitle').value = p.title || '';
                    document.getElementById('profileBio').value = p.bio || '';
                    document.getElementById('profileAvatar').value = p.avatar_url || '';
                    document.getElementById('profileEmail').value = p.email || '';
                    document.getElementById('profileGithub').value = p.github || '';
                    document.getElementById('profileLinkedin').value = p.linkedin || '';
                }
            } catch (e) {
                console.error(e);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('profileName').value,
                title: document.getElementById('profileTitle').value,
                bio: document.getElementById('profileBio').value,
                avatar_url: document.getElementById('profileAvatar').value,
                email: document.getElementById('profileEmail').value,
                github: document.getElementById('profileGithub').value,
                linkedin: document.getElementById('profileLinkedin').value
            };

            try {
                const res = await authFetch('/api/profile', {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
                if (res && res.success) {
                    showToast('資料儲存成功');
                } else {
                    showToast(res.message || '儲存失敗', 'error');
                }
            } catch (e) {
                showToast('儲存失敗', 'error');
            }
        });

        loadProfile();
    </script>
</body>
</html>
