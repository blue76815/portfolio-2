<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言管理 | 後台管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white">

    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 w-64 h-full bg-slate-800 border-r border-white/10 z-40">
        <div class="p-6">
            <h1 class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-violet-400 bg-clip-text text-transparent">後台管理</h1>
        </div>
        <nav class="mt-4">
            <a href="dashboard.html" class="flex items-center px-6 py-3 text-slate-300 hover:text-white hover:bg-white/5 border-l-4 border-transparent transition">
                <span class="mr-3">📊</span> 儀表板
            </a>
            <a href="projects.html" class="flex items-center px-6 py-3 text-slate-300 hover:text-white hover:bg-white/5 border-l-4 border-transparent transition">
                <span class="mr-3">💼</span> 作品管理
            </a>
            <a href="messages.html" class="flex items-center px-6 py-3 text-cyan-400 border-l-4 border-cyan-400 bg-white/5">
                <span class="mr-3">💬</span> 留言管理
            </a>
            <a href="profile.html" class="flex items-center px-6 py-3 text-slate-300 hover:text-white hover:bg-white/5 border-l-4 border-transparent transition">
                <span class="mr-3">👤</span> 個人資料
            </a>
            <button onclick="logout()" class="flex items-center px-6 py-3 text-slate-300 hover:text-red-400 hover:bg-white/5 border-l-4 border-transparent transition w-full text-left mt-8">
                <span class="mr-3">🚪</span> 登出
            </button>
        </nav>
    </aside>

    <!-- 主內容 -->
    <main class="ml-64 p-8">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-white">留言管理</h2>
            <p class="text-slate-400 mt-2">管理訪客留言，標記已讀或刪除</p>
        </div>

        <!-- 留言表格 -->
        <div class="bg-slate-800 border border-white/10 rounded-xl overflow-hidden">
            <table class="w-full">
                <thead class="bg-slate-700/50">
                    <tr>
                        <th class="text-left px-6 py-3 text-slate-300 text-sm font-medium">寄件人</th>
                        <th class="text-left px-6 py-3 text-slate-300 text-sm font-medium">Email</th>
                        <th class="text-left px-6 py-3 text-slate-300 text-sm font-medium">內容預覽</th>
                        <th class="text-left px-6 py-3 text-slate-300 text-sm font-medium">日期</th>
                        <th class="text-left px-6 py-3 text-slate-300 text-sm font-medium">狀態</th>
                        <th class="text-right px-6 py-3 text-slate-300 text-sm font-medium">操作</th>
                    </tr>
                </thead>
                <tbody id="messageList">
                    <tr><td colspan="6" class="px-6 py-8 text-center text-slate-500">載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- 留言詳情 Modal -->
    <div id="messageModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
        <div class="bg-slate-800 border border-white/10 rounded-xl p-8 w-full max-w-lg mx-4">
            <h3 class="text-xl font-bold text-white mb-4">留言詳情</h3>
            <div class="space-y-3">
                <p><span class="text-slate-400">寄件人：</span><span id="detailName" class="text-white"></span></p>
                <p><span class="text-slate-400">Email：</span><span id="detailEmail" class="text-cyan-400"></span></p>
                <p><span class="text-slate-400">日期：</span><span id="detailDate" class="text-white"></span></p>
                <div>
                    <p class="text-slate-400 mb-2">內容：</p>
                    <div id="detailContent" class="bg-slate-700 rounded-lg p-4 text-slate-200 whitespace-pre-wrap"></div>
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeMessageModal()" class="flex-1 py-2 bg-slate-600 hover:bg-slate-500 text-white rounded-lg transition">
                    關閉
                </button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        checkAuth();

        async function loadMessages() {
            try {
                const res = await authFetch('/api/messages');
                const list = document.getElementById('messageList');
                if (res && res.success && res.data.length > 0) {
                    list.innerHTML = res.data.map(m => {
                        const isUnread = !m.is_read;
                        const rowClass = isUnread ? 'bg-cyan-400/5' : '';
                        const statusBadge = isUnread
                            ? '<span class="px-2 py-1 bg-red-400/20 text-red-400 rounded text-xs">未讀</span>'
                            : '<span class="px-2 py-1 bg-green-400/20 text-green-400 rounded text-xs">已讀</span>';
                        const preview = m.content.length > 30 ? m.content.substring(0, 30) + '...' : m.content;

                        return `
                            <tr class="border-t border-white/5 hover:bg-white/5 transition ${rowClass}">
                                <td class="px-6 py-4 text-white font-medium">${m.name}</td>
                                <td class="px-6 py-4 text-slate-400 text-sm">${m.email}</td>
                                <td class="px-6 py-4 text-slate-400 text-sm cursor-pointer hover:text-white" onclick="viewMessage(${m.id})">${preview}</td>
                                <td class="px-6 py-4 text-slate-400 text-sm">${new Date(m.created_at).toLocaleDateString('zh-TW')}</td>
                                <td class="px-6 py-4">${statusBadge}</td>
                                <td class="px-6 py-4 text-right">
                                    ${isUnread ? `<button onclick="markRead(${m.id})" class="text-cyan-400 hover:text-cyan-300 text-sm mr-3 transition">標記已讀</button>` : ''}
                                    <button onclick="deleteMessage(${m.id})" class="text-red-400 hover:text-red-300 text-sm transition">刪除</button>
                                </td>
                            </tr>
                        `;
                    }).join('');
                } else {
                    list.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-slate-500">尚無留言</td></tr>';
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function viewMessage(id) {
            try {
                const res = await authFetch(`/api/messages/${id}`);
                if (res && res.success) {
                    const m = res.data;
                    document.getElementById('detailName').textContent = m.name;
                    document.getElementById('detailEmail').textContent = m.email;
                    document.getElementById('detailDate').textContent = new Date(m.created_at).toLocaleString('zh-TW');
                    document.getElementById('detailContent').textContent = m.content;
                    document.getElementById('messageModal').classList.remove('hidden');

                    if (!m.is_read) {
                        await markRead(id);
                    }
                }
            } catch (e) {
                showToast('載入留言失敗', 'error');
            }
        }

        function closeMessageModal() {
            document.getElementById('messageModal').classList.add('hidden');
        }

        async function markRead(id) {
            try {
                const res = await authFetch(`/api/messages/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ is_read: 1 })
                });
                if (res && res.success) {
                    loadMessages();
                }
            } catch (e) {
                showToast('操作失敗', 'error');
            }
        }

        async function deleteMessage(id) {
            if (!confirm('確定要刪除這則留言嗎？')) return;
            try {
                const res = await authFetch(`/api/messages/${id}`, { method: 'DELETE' });
                if (res && res.success) {
                    showToast('刪除成功');
                    loadMessages();
                } else {
                    showToast(res.message || '刪除失敗', 'error');
                }
            } catch (e) {
                showToast('刪除失敗', 'error');
            }
        }

        loadMessages();
    </script>
</body>
</html>
