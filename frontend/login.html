<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 | 個人履歷網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem;
        }
        input:focus {
            box-shadow: 0 0 15px rgba(34,211,238,0.2);
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .login-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 25%, #0f172a 50%, #164e63 75%, #0f172a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center text-white">

    <div class="w-full max-w-md px-4">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="index.html" class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-violet-400 bg-clip-text text-transparent">Portfolio</a>
            <p class="text-slate-400 mt-2">管理後台登入</p>
        </div>

        <!-- 登入卡片 -->
        <div class="glass-card p-8">
            <h1 class="text-2xl font-bold text-white mb-6 text-center">登入</h1>
            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="username" class="block text-slate-300 text-sm mb-2">帳號</label>
                    <input type="text" id="username" name="username" required
                        class="w-full px-4 py-3 bg-slate-800 border border-white/10 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400 transition-all duration-300"
                        placeholder="請輸入帳號">
                </div>
                <div>
                    <label for="password" class="block text-slate-300 text-sm mb-2">密碼</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-3 bg-slate-800 border border-white/10 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400 transition-all duration-300"
                        placeholder="請輸入密碼">
                </div>
                <button type="submit" id="loginBtn"
                    class="w-full py-3 bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-semibold rounded-lg transition-all duration-300 hover:scale-[1.02]">
                    登入
                </button>
                <p id="errorMsg" class="text-center text-sm text-red-400 hidden"></p>
            </form>
        </div>

        <p class="text-center mt-6">
            <a href="index.html" class="text-slate-400 hover:text-cyan-400 transition text-sm">← 回到首頁</a>
        </p>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                errorMsg.textContent = '請輸入帳號和密碼';
                errorMsg.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = '登入中...';
            errorMsg.classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('token', data.data.access_token);
                    window.location.href = 'admin/dashboard.html';
                } else {
                    errorMsg.textContent = data.detail || data.message || '登入失敗';
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = '網路錯誤，請確認後端服務已啟動';
                errorMsg.classList.remove('hidden');
            }

            btn.disabled = false;
            btn.textContent = '登入';
        });
    </script>
</body>
</html>
